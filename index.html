<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontrola · Infrastructure</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=34">
  <script defer src="https://umami.otoscale.com/script.js" data-website-id="95e2f393-0b37-472a-83e9-d704c76822f0"></script>
</head>

    <rect x="220" y="195" width="180" height="30" rx="8" fill="#E25716"/>
    <rect x="180" y="300" width="260" height="200" rx="20" fill="#ffffff"/>
    <rect x="470" y="300" width="260" height="200" rx="20" fill="#ffffff"/>
    <rect x="760" y="300" width="260" height="200" rx="20" fill="#E25716"/>
    <rect x="180" y="530" width="840" height="120" rx="20" fill="#ffffff"/>
    <rect x="220" y="575" width="500" height="14" rx="7" fill="#E25716" opacity="0.5"/>

<body style="font-family: Helvetica">
  <div class="wrap">

    <!-- ===================== TOP BAR ===================== -->
    <header class="topbar">
      <div class="navrow">
        <div class="logo">
          <img src="assets/kontrola-logo.png" alt="kontrola" class="logo-img">
        </div>

        <nav class="nav">
          <a href="#" data-page="overview">Overview</a>
          <a href="#" data-page="infrastructure">Infrastructure</a>
          <a href="#" data-page="storage">Storage</a>
          <a href="#" class="active" data-page="network">Network</a>
          <a href="#" data-page="applications">Applications</a>
          <a href="#" data-page="licenses">Licenses</a>
        </nav>

        <div class="nav-actions">
          <button class="icon-btn" title="Notifications" aria-label="Notifications">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
          </button>
          <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
            <svg id="theme-ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          </button>
          <div class="user-pill">
            <span class="avatar">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
            </span>
            <span><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="daafa9bfa89aaea8b3a9aebfb1f4b3be">[email&#160;protected]</a></span>
          </div>
        </div>
      </div>

      <div class="metarow">
        <div class="org-pill">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V5a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v16M19 21V9a1 1 0 0 0-1-1h-3"/><path d="M8 7h2M8 11h2M8 15h2"/></svg>
          tristek
        </div>
        <button class="date-pill">
          Jun 11, 11:25 – Jun 11, 23:25
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>
        </button>
      </div>
    </header>

    <!-- ===================== PAGE SCOPE (uplink / downlink lens) ===================== -->
    <div class="scope-bar">
      <div class="scope-left">
        <span class="scope-lbl">Aggregation lens</span>
        <div class="seg seg-lens" id="lens-seg" role="tablist" aria-label="Aggregation lens">
          <button class="seg-btn active" data-lens="uplink" title="Aggregate uplink ports"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>Uplink</button>
          <button class="seg-btn" data-lens="downlink" title="Aggregate downlink ports"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>Downlink</button>
        </div>
      </div>
      <span class="scope-note" id="scope-note"></span>
    </div>

    <!-- ===================== SUMMARY CARDS ===================== -->
    <section class="stats" id="stats"></section>

    <!-- ===================== NETWORK METRICS ===================== -->
    <div class="section-head">
      <div>
        <h2>Network Health Overview</h2>
        <span>Live metrics across all monitored devices</span>
      </div>
      <div class="seg" id="range-seg" role="tablist" aria-label="Time range">
        <button class="seg-btn" data-range="hourly">Hourly</button>
        <button class="seg-btn" data-range="weekly">Weekly</button>
        <button class="seg-btn" data-range="monthly">Monthly</button>
      </div>
    </div>
    <section class="charts" id="charts"></section>

    <!-- ===================== INFRASTRUCTURE TABLE ===================== -->
    <section class="card tablecard">
      <div class="tablehead">
        <div>
          <h2>Device</h2>
          <p id="table-sub">Devices in scope</p>
          <span id="active-filter" class="active-filter" hidden></span>
        </div>
        <div class="tools">
          <div class="tools-left">
            <div class="vendor-filter">
              <button class="vf-btn" id="vendor-btn" type="button" aria-label="Filter by vendor">Vendor</button>
              <div class="vf-pop" id="vendor-pop"></div>
            </div>
            <label class="show-ctl">Show
              <select class="sel" id="perpage">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
              </select>
            </label>
            <div class="search">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <input type="text" id="search" placeholder="Search device…" autocomplete="off">
            </div>
          </div>
          <div class="tools-right">
            <div class="seg seg-status" id="status-seg" role="tablist" aria-label="Filter by status">
              <button class="seg-btn active" data-status="all">All</button>
              <button class="seg-btn" data-status="up"><span class="sdot" style="background:var(--good)"></span>Up</button>
              <button class="seg-btn" data-status="down"><span class="sdot" style="background:var(--bad)"></span>Down</button>
            </div>
            <div class="export-menu">
              <button class="btn-csv" id="export-btn" type="button" aria-label="Export">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
                Export
                <svg class="ex-caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
              </button>
              <div class="export-pop" id="export-pop">
                <button type="button" data-export="csv">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
                  <span><b>CSV</b>Spreadsheet data</span>
                </button>
                <button type="button" data-export="pdf">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M9 13h6M9 17h4"/></svg>
                  <span><b>PDF</b>Printable report</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="table-scroll">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <span class="info" id="pager-info"></span>
        <div class="pages" id="pager-pages"></div>
      </div>
    </section>

  </div>

  <div class="chart-tip" id="chart-tip"></div>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="data.js?v=14"></script>
  <script src="common.js?v=11"></script>
  <script src="app.js?v=24"></script>
</body>
</html>
