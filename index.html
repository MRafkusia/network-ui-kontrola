      <div class="metarow">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18M5 21V5a1 1 0 0 1 1-1h8a1 1 0 0 1 1 1v16M19 21V9a1 1 0 0 0-1-1h-3"/><path d="M8 7h2M8 11h2M8 15h2"/></svg>

    <!-- ===================== SUMMARY CARDS ===================== -->
    <section class="stats" id="stats"></section>

    <!-- ===================== NETWORK METRICS ===================== -->
    <div class="section-head">
      <div>
        <h2>Network Health Overview</h2>
        <span>Live metrics across all monitored devices</span>
      </div>
      <div class="seg" id="range-seg" role="tablist" aria-label="Time range">
        <button class="seg-btn" data-range="hourly">Hourly</button>
        <button class="seg-btn" data-range="weekly">Weekly</button>
        <button class="seg-btn" data-range="monthly">Monthly</button>
      </div>
    </div>
    <section class="charts" id="charts"></section>

    <!-- ===================== INFRASTRUCTURE TABLE ===================== -->
    <section class="card tablecard">
      <div class="tablehead">
        <div>
          <h2>Infrastructure</h2>
          <p>List all infrastructure you monitor</p>
        </div>
        <div class="tools">
          <label class="show-ctl">Show
            <select class="sel" id="perpage">
              <option value="10">10</option>
              <option value="25">25</option>
              <option value="50">50</option>
            </select>
          </label>
          <div class="search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input type="text" id="search" placeholder="Search infrastructure…" autocomplete="off">
          </div>
          <button class="btn-csv" id="btn-csv">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
            Download CSV
          </button>
        </div>
      </div>

      <div class="table-scroll">
        <table>
          <thead id="thead"></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <span class="info" id="pager-info"></span>
        <div class="pages" id="pager-pages"></div>
      </div>
    </section>

  </div>

  <div class="chart-tip" id="chart-tip"></div>

  <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script src="data.js"></script>
